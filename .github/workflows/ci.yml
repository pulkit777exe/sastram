name: CI
on: [push, pull_request]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        continue-on-error: true

  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sastram_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sastram_test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sastram_test
          BETTER_AUTH_SECRET: ci_secret_that_is_long_enough_32chars
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CRON_SECRET: ci_cron_secret_long_enough_32chars
          GEMINI_API_KEY: skip
          OPENAI_API_KEY: skip
          REDIS_URL: redis://localhost:6379
          RESEND_API_KEY: re_ci_placeholder_key
          RESEND_FROM: "CI <ci@test.local>"
          RESEND_TEMPLATE_OTP: ci_placeholder
          RESEND_TEMPLATE_INVITATION: ci_placeholder
          RESEND_TEMPLATE_THREAD_SUMMARY: ci_placeholder
          RESEND_TEMPLATE_PASSWORD_RESET: ci_placeholder
          RESEND_TEMPLATE_WELCOME: ci_placeholder
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sastram_test
          BETTER_AUTH_SECRET: ci_secret_that_is_long_enough_32chars
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CRON_SECRET: ci_cron_secret_long_enough_32chars
          GEMINI_API_KEY: skip
          OPENAI_API_KEY: skip
          REDIS_URL: redis://localhost:6379
          RESEND_API_KEY: re_ci_placeholder_key
          RESEND_FROM: "CI <ci@test.local>"
          RESEND_TEMPLATE_OTP: ci_placeholder
          RESEND_TEMPLATE_INVITATION: ci_placeholder
          RESEND_TEMPLATE_THREAD_SUMMARY: ci_placeholder
          RESEND_TEMPLATE_PASSWORD_RESET: ci_placeholder
          RESEND_TEMPLATE_WELCOME: ci_placeholder

